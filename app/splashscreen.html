<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div class="container">
        <div class="square_holder">
            <div class="square"></div>
            <div class="square"></div>
            <div class="square"></div>
        </div>
        SOLYX
    </div>

    <style>
        body {
            background-color: red;
        }
        .square_holder {
            position: relative;

            width: 6em;
            height: 6em;
            padding: 1em;

            transform: rotate(225deg);
        }

        .square {
            --animation-duration: 4s;

            position: absolute;
            top: 1em;
            left: 1em;

            width: 2em;
            height: 2em;
            border: 4px #ffffff solid;

            animation: move var(--animation-duration) linear infinite;
        }

        .square:nth-child(2) {
            animation-delay: calc(var(--animation-duration) * (1/3));
        }

        .square:nth-child(3) {
            animation-delay: calc(var(--animation-duration) * (2/3));
        }

        @keyframes move {

            0%,
            16.66% {
                top: 1em;
                left: 1em;
            }

            25%,
            41.66% {
                top: 1em;
                left: 3em;
            }

            50%,
            66.66% {
                top: 3em;
                left: 3em;
            }

            75%,
            91.66% {
                top: 3em;
                left: 1em;
            }

            100% {
                top: 1em;
                left: 1em;
            }
        }

        /* OTHER */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .container {
            width: 100vw;
            height: 100vh;

            display: flex;
            flex-direction: column;
            gap: 10px;
            color: yellow;
            justify-content: center;
            align-items: center;

            background-color: #121420;
        }
    </style>
</body>

</html>
